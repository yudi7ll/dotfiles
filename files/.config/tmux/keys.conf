# Keybindings
bind-key -n M-H if-shell -F '#{pane_at_left}'   '' 'select-pane -L'
bind-key -n M-J if-shell -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -n M-K if-shell -F '#{pane_at_top}'    '' 'select-pane -U'
bind-key -n M-L if-shell -F '#{pane_at_right}' '' 'select-pane -R'

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split window shortcuts (vim-like)
unbind %
bind -n C-S-h split-window -h -c "#{pane_current_path}"
unbind '"'
bind -n C-S-l split-window -v -c "#{pane_current_path}"
unbind c
bind -n C-S-f new-window -c "#{pane_current_path}"

# Window navigation (Alt + h/l)
bind -n M-h previous-window
bind -n M-l next-window

# Reload configuration shortcut
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Copy mode
setw -g mode-keys vi
unbind [
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# sesh keybinding
unbind t
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""