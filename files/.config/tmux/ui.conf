# Theme colors
set -g @minimal_theme_bg_color "#121419"
set -g @minimal_theme_active_color "#b4befe"
set -g @minimal_theme_inactive_color "#6c7086"
set -g @minimal_theme_text_color "#cdd6f4"
set -g @minimal_theme_accent_color "#b4befe"
set -g @minimal_theme_border_color "#44475a"
set -g @minimal_theme_session_icon ""
set -g @minimal_theme_dir_icon ""
set -g @minimal_theme_memory_icon ""
set -g @minimal_theme_date_icon ""
set -g @minimal_theme_clock_icon ""
set -g @minimal_theme_battery_icon ""

# Status bar setup
set -g status on
set -g status-position top
set -g status-interval 3
set -g status-justify left

# Status bar colors and style
set -g status-style "bg=#{@minimal_theme_bg_color},fg=#{@minimal_theme_text_color}"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#{@minimal_theme_border_color}"
set -g pane-active-border-style "fg=#{@minimal_theme_active_color}"

# Message style
set -g message-style "bg=#{@minimal_theme_bg_color},fg=#{@minimal_theme_text_color},bold"
set -g message-command-style "bg=#{@minimal_theme_bg_color},fg=#{@minimal_theme_text_color},bold"

# Window status format
set -g window-status-format "#[fg=#{@minimal_theme_inactive_color},bg=#{@minimal_theme_bg_color}] #I:#W "
set -g window-status-current-format "#[fg=#{@minimal_theme_active_color},bg=#{@minimal_theme_bg_color},bold] #I:#W "
set -g window-status-separator ""

# Status left (session name)
set -g status-left "#[fg=#{@minimal_theme_accent_color},bold]#{@minimal_theme_session_icon}  #S #[fg=#{@minimal_theme_inactive_color}]│ "

# Status right with system info
set -g status-right "#[fg=#{@minimal_theme_accent_color}]#{@minimal_theme_dir_icon} #[fg=#{@minimal_theme_text_color}]#([ #{pane_current_path} = \"$HOME\" ] && echo '~' || basename #{pane_current_path}) #[fg=#{@minimal_theme_inactive_color}]│ #[fg=#{@minimal_theme_text_color}]#{@minimal_theme_memory_icon} #[fg=#{@minimal_theme_text_color}]#(free | awk '/^Mem/ { printf(\"%.0f%%\", \$3/\$2 * 100 - 0.5) }' ) #[fg=#{@minimal_theme_inactive_color}]│ #[fg=#{@minimal_theme_text_color}]#{@minimal_theme_date_icon} #[fg=#{@minimal_theme_text_color}]#(date +%d) #[fg=#{@minimal_theme_inactive_color}]│ #[fg=#{@minimal_theme_text_color}]#{@minimal_theme_clock_icon} #[fg=#{@minimal_theme_text_color}]#(date +%H:%M) #[fg=#{@minimal_theme_inactive_color}] "

# Copy mode styling
set -g mode-style "bg=none,fg=#{@minimal_theme_bg_color}"

# Clock mode
set -g clock-mode-colour "#{@minimal_theme_active_color}"
set -g clock-mode-style 24

# Pane separators
set -g pane-border-lines simple
set -g pane-border-style "fg=#{?pane_mode,#5fd7af,black}"
set -g pane-active-border-style "fg=#{?pane_mode,#5fd7af,magenta}"
